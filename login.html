<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S Produtos Ortopédicos - Login</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <img src="img/logo.png" alt="S Produtos Ortopédicos" class="logo-login">
            </div>
            
            <h2>Acessar Minha Conta</h2>
            <p class="subtitulo-login">Insira seus dados para acompanhar seus pedidos</p>
            
            <form id="form-login">
                <div class="input-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" placeholder="Sua senha" required>
                </div>
                
                <button type="submit" class="btn-entrar">ENTRAR</button>
            </form>
            
            <div class="login-footer">
                <p>Não tem uma conta? <a href="#" class="link-cadastro">Cadastre-se agora</a></p>
            </div>
        </div>
    </div>

    <div id="modal-cadastro" class="modal-overlay">
        <div class="modal-card">
            <button id="fechar-modal" class="btn-fechar">&times;</button>
            
            <h2>Criar Nova Conta</h2>
            <p>Preencha os dados abaixo para se cadastrar na loja.</p>

            <form id="form-cadastro" class="form-modal">
                <div class="input-group">
                    <label for="reg-nome">Nome Completo</label>
                    <input type="text" id="reg-nome" placeholder="Seu nome completo" required>
                </div>

                <div class="input-group">
                    <label for="reg-cpf">CPF</label>
                    <input type="text" id="reg-cpf" placeholder="000.000.000-00" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="Digite um CPF no formato 000.000.000-00" required>
                </div>

                <div class="input-group">
                    <label for="reg-telefone">Número de Telefone</label>
                    <input type="tel" id="reg-telefone" placeholder="(00) 90000-0000" required>
                </div>

                <div class="input-group">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" placeholder="seu@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="reg-password">Senha (mínimo 6 caracteres)</label>
                    <input type="password" id="reg-password" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn-confirmar-cadastro">
                    CADASTRAR AGORA <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script type="module" src="js/login.js"></script>
</body>
</html>
